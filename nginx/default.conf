# NEXT.JS FRONTEND (example.com)
server {
    listen 80;
    server_name example.com; # <--- Replace with your domain

    location / {
        # 'frontend' matches the service name in docker-compose.yml
        proxy_pass http://frontend:3000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}

# GIN BACKEND (api.example.com)
server {
    listen 80;
    server_name api.example.com; # <--- Replace with your subdomain

    location / {
        # 'backend' matches the service name in docker-compose.yml
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}