services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: always

  ssl-companion:
    image: nginxproxy/acme-companion
    container_name: ssl-companion
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=xercis.silao@ustp.edu.ph
      - NGINX_PROXY_CONTAINER=nginx-proxy
    depends_on:
      - nginx-proxy
    restart: always

  frontend:
    image: ghcr.io/aonoexercist/next-gin-frontend:latest
    container_name: frontend
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=xercisdev.theworkpc.com
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=xercisdev.theworkpc.com
      - API_URL=${API_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    env_file:
      - .env.fe
    restart: always

  backend:
    image: ghcr.io/aonoexercist/gin-api-backend:latest
    container_name: backend
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=api-xercisdev.theworkpc.com
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=api-xercisdev.theworkpc.com
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
    env_file:
      - .env.be
    restart: always

volumes:
  certs:
  vhost:
  html:
  acme: