services:
  nginx-proxy-fe:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy-fe
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs-fe:/etc/nginx/certs
      - vhost-fe:/etc/nginx/vhost.d
      - html-fe:/usr/share/nginx/html
    restart: always

  ssl-companion-fe:
    image: nginxproxy/acme-companion
    container_name: ssl-companion-fe
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs-fe:/etc/nginx/certs
      - vhost-fe:/etc/nginx/vhost.d
      - html-fe:/usr/share/nginx/html
      - acme-fe:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=xercis.silao@ustp.edu.ph
      - NGINX_PROXY_CONTAINER=nginx-proxy-fe
    restart: always

  frontend:
    image: ghcr.io/aonoexercist/next-gin-frontend:latest
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=xercisdev.theworkpc.com
      - LETSENCRYPT_HOST=xercisdev.theworkpc.com
      - VIRTUAL_PORT=3000
      - API_URL=https://api-xercisdev.theworkpc.com
    env_file: .env
    restart: always

volumes: 
  certs-fe: 
  vhost-fe: 
  html-fe: 
  acme-fe: