services:
  frontend:
    image: ghcr.io/aonoexercist/next-gin-frontend:latest
    expose:
      - "3000" # Internal only, Nginx can see it, the internet cannot.
    restart: always

  backend:
    image: ghcr.io/aonoexercist/gin-api-backend:latest
    expose:
      - "8080"
    restart: always
    environment:
      - DB_URL=${DB_URL} # Use a variable from a .env file for security

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: always