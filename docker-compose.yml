services:
  # THE REVERSE PROXY: Handles incoming traffic and routes to containers
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: always

  # THE SSL HELPER: Automatically gets certificates from Let's Encrypt
  ssl-companion:
    image: nginxproxy/acme-companion
    container_name: ssl-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    environment:
      - DEFAULT_EMAIL=xercis.silao@ustp.edu.ph # Replace with your email
      - NGINX_PROXY_CONTAINER=nginx-proxy
    depends_on:
      - nginx-proxy
    restart: always

  frontend:
    image: ghcr.io/aonoexercist/next-gin-frontend:latest
    container_name: frontend
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=xercisdev.theworkpc.com
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=xercisdev.theworkpc.com
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    env_file:
      - .env
    restart: always

  backend:
    image: ghcr.io/aonoexercist/gin-api-backend:latest
    container_name: backend
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=api-xercisdev.theworkpc.com
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=api-xercisdev.theworkpc.com
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    env_file:
      - .env
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  db_data:
  certs:
  vhost:
  html: