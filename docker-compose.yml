services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: always

  ssl-companion:
    image: nginxproxy/acme-companion
    container_name: ssl-companion
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=xercis.silao@ustp.edu.ph
      - NGINX_PROXY_CONTAINER=nginx-proxy
    restart: always

  backend:
    image: ghcr.io/aonoexercist/gin-api-backend:latest
    container_name: backend
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=api-xercisdev.theworkpc.com
      - LETSENCRYPT_HOST=api-xercisdev.theworkpc.com
      - VIRTUAL_PORT=8080
      - DB_HOST=${DB_HOST} # VM 3 Private IP
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    env_file: .env
    restart: always

volumes: 
  certs: 
  vhost: 
  html: 
  acme: 