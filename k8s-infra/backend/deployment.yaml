apiVersion: apps/v1
kind: Deployment
metadata:
  name: gin-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gin-backend
  template:
    metadata:
      labels:
        app: gin-backend
    spec:
      containers:
        - name: gin-backend
          image: your-dockerhub/gin-api
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: user
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: mydb